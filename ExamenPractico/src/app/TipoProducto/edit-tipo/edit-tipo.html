<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        
        <div class="card-header bg-warning text-dark text-center py-3">
            <h4 class="m-0 font-weight-bold">Modificar Tipo de Producto</h4>
        </div>

        <div class="card-body p-4">
            <form #miForm="ngForm" (ngSubmit)="Actualizar(formRef)" #formRef novalidate [ngClass]="{'was-validated': formValidacion}">

                <div class="mb-3">
                    <label class="form-label text-secondary font-weight-bold">Nombre del Tipo de Producto:</label>
                    
                    <input type="text" [(ngModel)]="tipoProducto.nombreTipo" name="nombreTipo" class="form-control" required placeholder="Ej. Electrónicos, Alimentos">
                    
                    <div class="valid-feedback">¡Correcto!</div>
                    <div class="invalid-feedback">Por favor, escribe el nombre del tipo de producto.</div>
                </div>

                <hr class="text-muted">

                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a routerLink="/listar-tipos" class="btn btn-secondary px-4">Cancelar</a>
                    
                    <button type="submit" class="btn btn-warning px-4 text-dark font-weight-bold">Actualizar Tipo</button>
                </div>

            </form>
        </div>

    </div>
</div>
