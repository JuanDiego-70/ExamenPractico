<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        
        <div class="card-header bg-warning text-dark text-center py-3">
            <h4 class="m-0 font-weight-bold">Modificar Datos del Producto</h4>
        </div>

        <div class="card-body p-4">
            <form #miForm="ngForm" (ngSubmit)="Actualizar(formRef)" #formRef novalidate [ngClass]="{'was-validated': formValidacion}">

                <div class="mb-3">
                    <label class="form-label text-secondary font-weight-bold">Nombre del Producto:</label>
                    <input type="text" [(ngModel)]="producto.nombre" name="nombre" class="form-control" required placeholder="Ej. Pantalla LED">
                    <div class="valid-feedback">¡Correcto!</div>
                    <div class="invalid-feedback">Por favor, escribe el nombre del producto.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary font-weight-bold">Cantidad / Stock:</label>
                    <input type="number" [(ngModel)]="producto.cantidad" name="cantidad" class="form-control" required min="1" placeholder="Mínimo 1">
                    <div class="valid-feedback">¡Correcto!</div>
                    <div class="invalid-feedback">La cantidad debe ser un número entero mayor a 0.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary font-weight-bold">Tipo de Producto:</label>
                    <select [(ngModel)]="producto.tipoProducto.idTipo" name="idTipo" class="form-control" required>
                        <option value="" disabled selected>Selecciona un tipo...</option>
                        <option *ngFor="let tipo of tipos" [value]="tipo.idTipo">
                            {{ tipo.nombreTipo }}
                        </option>
                    </select>
                    <div class="valid-feedback">¡Tipo seleccionado!</div>
                    <div class="invalid-feedback">Por favor, elige un tipo de producto válido.</div>
                </div>

                <hr class="text-muted">

                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a routerLink="/listar" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-warning px-4 text-dark font-weight-bold">Actualizar Producto</button>
                </div>

            </form>
        </div>

    </div>
</div>
